name: Release

# Runs AFTER CI passes. Auto-bumps version based on commit messages:
#   "fix: ..." or "bug: ..."    → patch (1.0.0 → 1.0.1)
#   "feat: ..." or "add: ..."   → minor (1.0.0 → 1.1.0)
#   "breaking: ..." or "BREAKING CHANGE" → major (1.0.0 → 2.0.0)
#   anything else                → patch
#
# To skip: include [skip release] in your commit message.
# Manual: push a tag like v1.2.3 directly.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    # Only if CI passed, on main branch, not a tag push, not skip
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'v') &&
      !contains(github.event.workflow_run.head_commit.message, '[skip release]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Get latest tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Parse current version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%-*}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Get commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" ${LATEST_TAG}..HEAD)
          fi

          # No new commits since last tag — skip
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new commits since $LATEST_TAG, skipping release"
            exit 0
          fi

          # Determine bump type from commit messages
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^(breaking|BREAKING CHANGE)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^(feat|add|feature):"; then
            BUMP="minor"
          fi

          # Apply bump
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Bump: $BUMP ($LATEST_TAG → v$NEW_VERSION)"

      - name: Generate changelog
        if: steps.bump.outputs.skip != 'true'
        id: changelog
        run: |
          LATEST_TAG="${{ steps.bump.outputs.latest_tag }}"
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${LATEST_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag and release
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: |
            ## DonkeyGo v${{ steps.bump.outputs.new_version }}

            ### Installation

            ```go
            go get github.com/pacosw1/donkeygo@v${{ steps.bump.outputs.new_version }}
            ```

            ### Changes (${{ steps.bump.outputs.bump }} release)

            ${{ steps.changelog.outputs.commits }}
          draft: false
          prerelease: false

  # Manual tag push — create release only if CI passed for that tag
  manual-release:
    name: Manual Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag from workflow run
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## DonkeyGo ${{ steps.version.outputs.tag }}

            ### Installation

            ```go
            go get github.com/pacosw1/donkeygo@${{ steps.version.outputs.tag }}
            ```

            ### Changes

            ${{ steps.changelog.outputs.commits }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-rc') }}
